<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partidos - Mundial 2026</title>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js" integrity="sha384-JEW9xMcG8R+pH31jmWH6WWP0WintQrMb4s7ZOdauHnUtxwoG2vI5DkLtS3qm9Ekf" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/styles_final.css?v=visual-polish-1">
    <link rel="stylesheet" href="css/layout.css?v=persistent-shell-4">
    <link rel="icon" href="./css/icon/favicon-ball.ico" />
    <style>
        .predict-banner {
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .predict-banner.is-guest { background: rgba(255, 193, 7, 0.12); border: 1px solid rgba(255, 193, 7, 0.4); }
        .predict-banner.is-user { background: rgba(118, 255, 3, 0.10); border: 1px solid rgba(118, 255, 3, 0.35); }
        .predict-banner a { font-weight: 700; }
        .pred-status { font-size: 0.8rem; margin: 6px 0 0; min-height: 1em; }
        .pred-status.ok { color: #76ff03; }
        .pred-status.saving { color: #bdbdbd; }
        .pred-status.error { color: #ff6b6b; }
        .pred-status.muted { color: #9e9e9e; }
        .prediction-game-card .prediction-inputs { margin-top: 10px; }
    </style>
</head>
<body class="bg-dark text-white">

    <header id="app-navbar"></header>

    <div class="container py-4">
        <section class="section-hero section-hero--fixtures">
            <div class="section-hero-content">
                <span class="hero-badge">MUNDIAL 2026</span>
                <h1 class="hero-title">Partidos del Mundial 2026</h1>
                <p class="hero-subtitle">Filtrá por etapa o grupo y cargá tus predicciones partido por partido.</p>
            </div>
        </section>
        <div id="sync-status-banner" class="text-center text-muted" style="margin-bottom: 16px; font-size: 0.85rem;"></div>

        <div id="predict-banner" class="predict-banner" style="display: none;"></div>

        <div class="filter-bar" id="fixtures-filter-bar">
            <div class="filter-bar__row">
                <div class="filter-field">
                    <label for="stage-filter">Etapa</label>
                    <select id="stage-filter">
                        <option value="GROUP">Grupos</option>
                        <option value="R32">Ronda de 32</option>
                        <option value="R16">Octavos</option>
                        <option value="QF">Cuartos</option>
                        <option value="SF">Semis</option>
                        <option value="3P">Tercer puesto</option>
                        <option value="FINAL">Final</option>
                    </select>
                </div>
                <div class="filter-field">
                    <label for="team-search">Buscar equipo</label>
                    <input type="text" id="team-search" placeholder="Argentina, México...">
                </div>
                <div class="filter-field">
                    <label>Mostrar</label>
                    <label class="filter-toggle">
                        <input type="checkbox" id="upcoming-toggle" checked>
                        <span>Próximos / Todos</span>
                    </label>
                </div>
            </div>
            <div class="filter-bar__row" id="group-filter-field" style="display: none;">
                <div class="filter-field">
                    <label>Grupo</label>
                    <div id="group-toggle" class="group-toggle">
                        <button type="button" class="view-toggle__button group-toggle__button active" data-group="ALL">Todos</button>
                        <button type="button" class="view-toggle__button group-toggle__button" data-group="A">A</button>
                        <button type="button" class="view-toggle__button group-toggle__button" data-group="B">B</button>
                        <button type="button" class="view-toggle__button group-toggle__button" data-group="C">C</button>
                        <button type="button" class="view-toggle__button group-toggle__button" data-group="D">D</button>
                        <button type="button" class="view-toggle__button group-toggle__button" data-group="E">E</button>
                        <button type="button" class="view-toggle__button group-toggle__button" data-group="F">F</button>
                        <button type="button" class="view-toggle__button group-toggle__button" data-group="G">G</button>
                        <button type="button" class="view-toggle__button group-toggle__button" data-group="H">H</button>
                        <button type="button" class="view-toggle__button group-toggle__button" data-group="I">I</button>
                        <button type="button" class="view-toggle__button group-toggle__button" data-group="J">J</button>
                        <button type="button" class="view-toggle__button group-toggle__button" data-group="K">K</button>
                        <button type="button" class="view-toggle__button group-toggle__button" data-group="L">L</button>
                    </div>
                </div>
            </div>
            <div class="filter-bar__row" id="view-toggle-row" style="display: none;">
                <div class="filter-field">
                    <label>Vista</label>
                    <div class="view-toggle" role="group" aria-label="Vista de eliminatorias">
                        <button type="button" class="view-toggle__button active" data-view="list">Lista</button>
                        <button type="button" class="view-toggle__button" data-view="bracket">Llaves</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Games List -->
        <div id="game-list" class="game-list">
            <p class="loading-message">Cargando partidos...</p>
        </div>
        <div id="knockout-view" style="display: none;"></div>
    </div>

    <script type="module">
        import { mountNavbar } from "./js/layout.js?v=persistent-shell-4";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { initFirebase } from "./js/firebase-config.js?v=opt1";
        import { ADMIN_UID } from "./js/app-config.js?v=edmonton-time-1";
        import { TOURNAMENT_CONFIG, resolveStageLabel, formatTournamentDateTime } from "./js/tournament-config.js?v=edmonton-time-1";
        import {
            getGameStatus, getStageIdFromGame, buildStageState, buildStageUnlocks,
            getLockMessage, hasKickedOff, resolveDisplayName
        } from "./js/predictions.js?v=edmonton-time-1";

        mountNavbar({ activeKey: "matches" });

        const { app, db, auth } = initFirebase();

        // State
        let allGames = [];
        let allTeams = {};
        let viewMode = 'list';
        let selectedGroup = 'ALL';
        let stageUnlocks = {};
        let currentUserId = null;
        let currentDisplayName = '';
        let userPredictionsByGame = new Map();
        const saveTimers = new Map();
        const lockRefreshTimers = new Map();

        const KNOCKOUT_STAGES = ['R32', 'R16', 'QF', 'SF', '3P', 'FINAL'];
        const STAGE_LABELS = {
            GROUP: 'Fase de grupos',
            R32: 'Ronda de 32',
            R16: 'Octavos de final',
            QF: 'Cuartos de final',
            SF: 'Semifinales',
            '3P': 'Tercer puesto',
            FINAL: 'Final'
        };
        const statusLabelMap = {
            finished: 'Finalizado',
            live: 'En vivo',
            upcoming: 'Próximo'
        };

        const gameListDiv = document.getElementById('game-list');
        const knockoutView = document.getElementById('knockout-view');
        const stageSelect = document.getElementById('stage-filter');
        const groupFilterField = document.getElementById('group-filter-field');
        const groupToggle = document.getElementById('group-toggle');
        const groupButtons = groupToggle ? groupToggle.querySelectorAll('.group-toggle__button') : [];
        const teamSearchInput = document.getElementById('team-search');
        const upcomingToggle = document.getElementById('upcoming-toggle');
        const viewToggleRow = document.getElementById('view-toggle-row');
        const viewToggleButtons = document.querySelectorAll('.view-toggle__button[data-view]');
        const predictBanner = document.getElementById('predict-banner');

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = String(value ?? '');
            return div.innerHTML;
        }

        loadSyncStatus();

        function updateNavbarForUser(user) {
            const isAdmin = user && user.uid === ADMIN_UID;
            mountNavbar({ activeKey: 'matches', showAdmin: isAdmin });
        }

        onAuthStateChanged(auth, async (user) => {
            updateNavbarForUser(user);
            currentUserId = user ? user.uid : null;
            currentDisplayName = user ? resolveDisplayName(user) : '';
            updatePredictBanner(user);
            if (user) {
                await loadUserPredictions();
            } else {
                userPredictionsByGame = new Map();
            }
            if (allGames.length > 0) {
                displayFilteredGames();
            }
        });

        function updatePredictBanner(user) {
            if (!predictBanner) return;
            predictBanner.style.display = 'flex';
            if (user) {
                predictBanner.className = 'predict-banner is-user';
                predictBanner.innerHTML = `<span>Cargás como <strong>${escapeHtml(currentDisplayName)}</strong>. Completá los dos marcadores y se guarda solo.</span>`;
            } else {
                predictBanner.className = 'predict-banner is-guest';
                predictBanner.innerHTML = `<span>Para cargar predicciones necesitás tu cuenta.</span><a href="index.html">Iniciar sesión</a>`;
            }
        }

        async function loadUserPredictions() {
            if (!currentUserId) return;
            try {
                const snapshot = await getDocs(query(
                    collection(db, 'predictions'),
                    where('userId', '==', currentUserId),
                    where('tournamentId', '==', TOURNAMENT_CONFIG.tournamentId)
                ));
                userPredictionsByGame = new Map();
                snapshot.forEach(d => {
                    const data = d.data();
                    if (data.gameId) userPredictionsByGame.set(data.gameId, data);
                });
            } catch (error) {
                console.error("Error loading user predictions: ", error);
            }
        }

        async function loadTeams() {
            try {
                const teamsSnapshot = await getDocs(collection(db, 'teams'));
                allTeams = {};
                teamsSnapshot.forEach(doc => {
                    const team = doc.data();
                    allTeams[team.name] = team;
                });
            } catch (error) {
                console.error("Error loading teams: ", error);
            }
        }

        async function loadGames() {
            gameListDiv.innerHTML = '<p class="loading-message">Cargando partidos...</p>';
            try {
                const snapshot = await getDocs(query(
                    collection(db, 'games'),
                    where('tournamentId', '==', TOURNAMENT_CONFIG.tournamentId)
                ));

                if (snapshot.empty) {
                    gameListDiv.innerHTML = '<p>No hay partidos.</p>';
                    return;
                }

                allGames = [];
                snapshot.forEach(doc => {
                    allGames.push({ id: doc.id, ...doc.data() });
                });
                allGames.sort((a, b) => {
                    const timeA = a.KickOffTime ? new Date(a.KickOffTime).getTime() : 0;
                    const timeB = b.KickOffTime ? new Date(b.KickOffTime).getTime() : 0;
                    return timeA - timeB;
                });

                stageUnlocks = buildStageUnlocks(buildStageState(allGames));
                scheduleLockRefreshes();

                updateStageUI();
                displayFilteredGames();
            } catch (error) {
                console.error("Error loading games: ", error);
                gameListDiv.innerHTML = '<p>Error al cargar partidos. Intenta nuevamente.</p>';
            }
        }

        function updateGroupButtons() {
            groupButtons.forEach(button => {
                button.classList.toggle('active', button.dataset.group === selectedGroup);
            });
        }

        function updateStageUI() {
            if (!stageSelect || !groupFilterField || !viewToggleRow) return;
            const isGroup = stageSelect.value === 'GROUP';
            groupFilterField.style.display = isGroup ? 'grid' : 'none';
            if (!isGroup) {
                selectedGroup = 'ALL';
                updateGroupButtons();
            }
            viewToggleRow.style.display = isGroup ? 'none' : 'block';
            if (isGroup) {
                viewMode = 'list';
                viewToggleButtons.forEach(button => {
                    button.classList.toggle('active', button.dataset.view === 'list');
                });
            }
        }

        function getFilteredGames() {
            const stageValue = stageSelect ? stageSelect.value : '';
            const groupValue = selectedGroup;
            const searchTerm = teamSearchInput ? teamSearchInput.value.trim().toLowerCase() : '';
            const upcomingOnly = upcomingToggle ? upcomingToggle.checked : false;

            return allGames.filter(game => {
                const stage = String(game.Stage || game.stage || '').toUpperCase();
                if (stageValue && stage !== stageValue) return false;
                if (stageValue === 'GROUP' && groupValue !== 'ALL') {
                    const group = String(game.Group || game.group || '').toUpperCase();
                    if (group !== groupValue) return false;
                }
                if (searchTerm) {
                    const home = String(game.HomeTeam || '').toLowerCase();
                    const away = String(game.AwayTeam || '').toLowerCase();
                    if (!home.includes(searchTerm) && !away.includes(searchTerm)) return false;
                }
                if (upcomingOnly && getGameStatus(game) === 'finished') return false;
                return true;
            }).sort((a, b) => {
                const timeA = a.KickOffTime ? new Date(a.KickOffTime).getTime() : 0;
                const timeB = b.KickOffTime ? new Date(b.KickOffTime).getTime() : 0;
                return timeA - timeB;
            });
        }

        function predictionBlockHtml(game) {
            if (getGameStatus(game) !== 'upcoming') return '';
            const stageId = getStageIdFromGame(game);
            const isLocked = stageId && Object.prototype.hasOwnProperty.call(stageUnlocks, stageId)
                ? !stageUnlocks[stageId] : false;

            if (!currentUserId) {
                return `<p class="lock-notice">Iniciá sesión para predecir este partido.</p>`;
            }
            if (isLocked) {
                return `<p class="lock-notice">${escapeHtml(getLockMessage(stageId))}</p>`;
            }
            if (hasKickedOff(game)) {
                return `<p class="lock-notice">Predicciones cerradas: el partido ya empezó.</p>`;
            }

            const pred = userPredictionsByGame.get(game.id);
            const h = pred && pred.predictedHomeScore !== null && pred.predictedHomeScore !== undefined ? pred.predictedHomeScore : '';
            const a = pred && pred.predictedAwayScore !== null && pred.predictedAwayScore !== undefined ? pred.predictedAwayScore : '';
            return `
                <div class="prediction-inputs" data-pred-game="${escapeHtml(game.id)}">
                    <input type="number" min="0" inputmode="numeric" class="score-input" data-game-id="${escapeHtml(game.id)}" data-team="home" value="${h}" aria-label="Goles ${escapeHtml(game.HomeTeam)}">
                    <span class="score-separator">-</span>
                    <input type="number" min="0" inputmode="numeric" class="score-input" data-game-id="${escapeHtml(game.id)}" data-team="away" value="${a}" aria-label="Goles ${escapeHtml(game.AwayTeam)}">
                </div>
                <p class="pred-status ok" data-pred-status="${escapeHtml(game.id)}">${pred ? 'Guardado ✓' : ''}</p>
            `;
        }

        function canPredictGame(game) {
            if (!game || !currentUserId) return false;
            if (getGameStatus(game) !== 'upcoming') return false;
            const stageId = getStageIdFromGame(game);
            const isLocked = stageId && Object.prototype.hasOwnProperty.call(stageUnlocks, stageId)
                ? !stageUnlocks[stageId] : false;
            return !isLocked && !hasKickedOff(game);
        }

        function scheduleLockRefreshes() {
            lockRefreshTimers.forEach(timer => clearTimeout(timer));
            lockRefreshTimers.clear();

            const now = Date.now();
            const maxDelay = 2147483647;
            allGames.forEach(game => {
                if (!game.KickOffTime || getGameStatus(game) !== 'upcoming') return;
                const kickoff = new Date(game.KickOffTime).getTime();
                const delay = kickoff - now;
                if (!Number.isFinite(delay) || delay < 0 || delay > maxDelay) return;

                const timer = setTimeout(() => {
                    saveTimers.forEach(saveTimer => clearTimeout(saveTimer));
                    saveTimers.clear();
                    displayFilteredGames();
                    scheduleLockRefreshes();
                }, delay + 1000);
                lockRefreshTimers.set(game.id, timer);
            });
        }

        function createGameCard(game) {
            const homeLogoUrl = (allTeams[game.HomeTeam] || {}).logoUrl || '';
            const awayLogoUrl = (allTeams[game.AwayTeam] || {}).logoUrl || '';

            const statusValue = getGameStatus(game);
            const statusLabel = statusLabelMap[statusValue] || statusValue;
            let scoreDisplay = '';
            if (statusValue === 'finished') {
                const homeScore = game.HomeScore !== null && game.HomeScore !== undefined ? game.HomeScore : '?';
                const awayScore = game.AwayScore !== null && game.AwayScore !== undefined ? game.AwayScore : '?';
                scoreDisplay = `<p><strong>Resultado:</strong> ${escapeHtml(homeScore)} - ${escapeHtml(awayScore)}</p>`;
            }

            let phaseLabel = resolveStageLabel(game);
            if ((game.Stage || game.stage) === 'GROUP' && (game.Group || game.group)) {
                phaseLabel = `Grupo ${String(game.Group || game.group).toUpperCase()}`;
            }

            const predictionBlock = predictionBlockHtml(game);

            const gameCard = document.createElement('div');
            gameCard.classList.add('app-card', 'game-card');
            if (predictionBlock.includes('prediction-inputs')) {
                gameCard.classList.add('prediction-game-card');
            }

            const kickoffLabel = game.KickOffTime ? formatTournamentDateTime(game.KickOffTime) : 'Sin horario';

            gameCard.innerHTML = `
                <div class="teams-row">
                    <div class="team">
                        ${homeLogoUrl ? `<img src="${escapeHtml(homeLogoUrl)}" alt="${escapeHtml(game.HomeTeam)} Logo" class="team-logo">` : '<div class="team-logo-placeholder">-</div>'}
                        <p class="team-name">${escapeHtml(game.HomeTeam)}</p>
                    </div>
                    <div class="vs-separator">vs</div>
                    <div class="team">
                        ${awayLogoUrl ? `<img src="${escapeHtml(awayLogoUrl)}" alt="${escapeHtml(game.AwayTeam)} Logo" class="team-logo">` : '<div class="team-logo-placeholder">-</div>'}
                        <p class="team-name">${escapeHtml(game.AwayTeam)}</p>
                    </div>
                </div>
                <p><strong>Fase:</strong> ${escapeHtml(phaseLabel)}</p>
                <p><strong>Inicio:</strong> ${escapeHtml(kickoffLabel)}</p>
                <p><strong>Estado:</strong> <span class="status ${statusValue}">${escapeHtml(statusLabel)}</span></p>
                ${scoreDisplay}
                ${predictionBlock}
            `;
            return gameCard;
        }

        function displayFilteredGames() {
            const filteredGames = getFilteredGames();

            if (filteredGames.length === 0) {
                gameListDiv.innerHTML = '<p class="text-center">No hay partidos para este filtro.</p>';
                gameListDiv.style.display = 'block';
                knockoutView.style.display = 'none';
                knockoutView.innerHTML = '';
                return;
            }

            if (viewMode === 'bracket') {
                renderKnockoutView(filteredGames);
                return;
            }

            gameListDiv.style.display = 'grid';
            knockoutView.style.display = 'none';
            knockoutView.innerHTML = '';
            gameListDiv.innerHTML = '';
            filteredGames.forEach(game => gameListDiv.appendChild(createGameCard(game)));
        }

        function renderKnockoutView(filteredGames) {
            knockoutView.innerHTML = '';
            gameListDiv.style.display = 'none';
            knockoutView.style.display = 'block';

            KNOCKOUT_STAGES.forEach(stageKey => {
                const stageGames = filteredGames.filter(game => String(game.Stage || game.stage || '').toUpperCase() === stageKey);
                if (stageGames.length === 0) return;

                const section = document.createElement('div');
                section.classList.add('knockout-section');
                const title = document.createElement('h3');
                title.classList.add('knockout-section__title');
                title.textContent = STAGE_LABELS[stageKey] || stageKey;
                section.appendChild(title);

                const list = document.createElement('div');
                list.classList.add('game-list');
                stageGames.forEach(game => list.appendChild(createGameCard(game)));
                section.appendChild(list);
                knockoutView.appendChild(section);
            });
        }

        function handleViewToggle(targetView) {
            viewMode = targetView;
            viewToggleButtons.forEach(button => {
                button.classList.toggle('active', button.dataset.view === targetView);
            });
            displayFilteredGames();
        }

        // --- Auto-save predictions (per match) ---
        function setStatus(gameId, text, kind) {
            const el = document.querySelector(`[data-pred-status="${gameId}"]`);
            if (!el) return;
            el.textContent = text;
            el.className = `pred-status ${kind || ''}`;
        }

        function handleScoreChange(event) {
            const input = event.target.closest('.score-input');
            if (!input) return;
            const gameId = input.dataset.gameId;
            if (!gameId) return;
            if (saveTimers.has(gameId)) clearTimeout(saveTimers.get(gameId));
            saveTimers.set(gameId, setTimeout(() => savePredictionForGame(gameId), 450));
        }

        async function savePredictionForGame(gameId) {
            if (!currentUserId) return;
            const game = allGames.find(item => item.id === gameId);
            if (!canPredictGame(game)) {
                setStatus(gameId, 'Predicciones cerradas: el partido ya empezÃ³.', 'error');
                displayFilteredGames();
                return;
            }
            const container = document.querySelector(`[data-pred-game="${gameId}"]`);
            if (!container) return;
            const homeInput = container.querySelector('[data-team="home"]');
            const awayInput = container.querySelector('[data-team="away"]');
            const homeRaw = homeInput.value.trim();
            const awayRaw = awayInput.value.trim();

            if (homeRaw === '' || awayRaw === '') {
                setStatus(gameId, 'Completá ambos marcadores para guardar.', 'muted');
                return;
            }
            const home = Number(homeRaw);
            const away = Number(awayRaw);
            if (!Number.isInteger(home) || !Number.isInteger(away) || home < 0 || away < 0) {
                setStatus(gameId, 'Marcador inválido.', 'error');
                return;
            }

            setStatus(gameId, 'Guardando…', 'saving');
            try {
                const predictionData = {
                    userId: currentUserId,
                    playerName: currentDisplayName,
                    gameId,
                    predictedHomeScore: home,
                    predictedAwayScore: away,
                    tournamentId: TOURNAMENT_CONFIG.tournamentId,
                    timestamp: new Date()
                };
                await setDoc(doc(db, 'predictions', `${currentUserId}_${gameId}`), predictionData, { merge: true });
                userPredictionsByGame.set(gameId, predictionData);
                setStatus(gameId, 'Guardado ✓', 'ok');
            } catch (error) {
                console.error("Error saving prediction: ", error);
                setStatus(gameId, 'Error al guardar. Reintentá.', 'error');
            }
        }

        gameListDiv.addEventListener('change', handleScoreChange);
        knockoutView.addEventListener('change', handleScoreChange);

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadTeams();
            await loadGames();

            if (stageSelect) {
                stageSelect.addEventListener('change', () => {
                    updateStageUI();
                    displayFilteredGames();
                });
            }
            groupButtons.forEach(button => {
                button.addEventListener('click', () => {
                    selectedGroup = button.dataset.group || 'ALL';
                    updateGroupButtons();
                    displayFilteredGames();
                });
            });
            if (teamSearchInput) teamSearchInput.addEventListener('input', displayFilteredGames);
            if (upcomingToggle) upcomingToggle.addEventListener('change', displayFilteredGames);
            viewToggleButtons.forEach(button => {
                button.addEventListener('click', () => handleViewToggle(button.dataset.view));
            });
        });

        async function loadSyncStatus() {
            const banner = document.getElementById('sync-status-banner');
            if (!banner) return;
            try {
                const statusSnap = await getDoc(doc(db, 'sync_status', TOURNAMENT_CONFIG.tournamentId));
                const data = statusSnap.exists() ? statusSnap.data() : {};
                const lastSync = data.lastSuccessAt || data.lastSyncedAt || data.lastRunAt;
                const lastText = lastSync ? formatTournamentDateTime(lastSync) : 'N/A';
                banner.textContent = `Actualización automática post-partido (no en vivo). Última sync: ${lastText}`;
            } catch (error) {
                banner.textContent = 'Actualización automática post-partido (no en vivo).';
            }
        }
    </script>
