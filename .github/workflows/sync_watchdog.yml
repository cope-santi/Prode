name: Sync Watchdog

on:
  schedule:
    # Offset from crowded :00/:10 minutes; the job itself gates Firebase access.
    - cron: "9,19,29,39,49,59 * * * *"
  workflow_dispatch: {}

concurrency:
  group: post-match-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Check sync window
        id: sync-window
        shell: bash
        run: |
          node scripts/sync-window.js --github-output || test $? -eq 2

      - name: Setup Node
        if: steps.sync-window.outputs.should_run == 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install deps
        if: steps.sync-window.outputs.should_run == 'true'
        working-directory: scripts/sync
        run: npm install

      - name: Run sync
        if: steps.sync-window.outputs.should_run == 'true'
        working-directory: scripts/sync
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          THESPORTSDB_API_KEY: ${{ secrets.THESPORTSDB_API_KEY }}
          THESPORTSDB_LEAGUE_ID: ${{ secrets.THESPORTSDB_LEAGUE_ID }}
          THESPORTSDB_SEASON: ${{ secrets.THESPORTSDB_SEASON }}
          THESPORTSDB_ROUNDS: ${{ secrets.THESPORTSDB_ROUNDS }}
          SYNC_TEAM_LOGOS: ${{ secrets.SYNC_TEAM_LOGOS || secrets.SYNC_TEAM_LOGO || 'false' }}
          FORCE_TEAM_LOGOS: ${{ secrets.FORCE_TEAM_LOGOS }}
          TOURNAMENT_ID: ${{ secrets.TOURNAMENT_ID }}
          LOOKBACK_DAYS: ${{ secrets.LOOKBACK_DAYS }}
          POST_MATCH_SYNC_MINUTES: ${{ secrets.POST_MATCH_SYNC_MINUTES }}
          PROVIDER_CACHE_TTL_MS: ${{ secrets.PROVIDER_CACHE_TTL_MS }}
        run: node run.js
