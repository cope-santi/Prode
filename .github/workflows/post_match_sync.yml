name: Post Match Sync

on:
  schedule:
    # Group-stage sweep. Times are UTC.
    # Runs 5/35 minutes after common kickoffs to publish predictions,
    # 10/40 minutes after expected full time to apply points,
    # and repeats at 20/50 as a retry when GitHub schedule is delayed.
    - cron: "5,10,20,35,40,50 0-6,16-23 11-28 6 *"
    # Knockout sweep. Runs every 10 minutes during likely match/result windows.
    # This is more reliable than many exact one-off cron times, while still
    # staying scoped to tournament dates and high-value hours to protect quota.
    - cron: "*/10 0-6,16-23 29-30 6 *"
    - cron: "*/10 0-6,16-23 1-19 7 *"
  workflow_dispatch: {}

concurrency:
  group: post-match-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install deps
        working-directory: scripts/sync
        run: npm install

      - name: Run sync
        working-directory: scripts/sync
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          THESPORTSDB_API_KEY: ${{ secrets.THESPORTSDB_API_KEY }}
          THESPORTSDB_LEAGUE_ID: ${{ secrets.THESPORTSDB_LEAGUE_ID }}
          THESPORTSDB_SEASON: ${{ secrets.THESPORTSDB_SEASON }}
          THESPORTSDB_ROUNDS: ${{ secrets.THESPORTSDB_ROUNDS }}
          SYNC_TEAM_LOGOS: ${{ secrets.SYNC_TEAM_LOGOS || secrets.SYNC_TEAM_LOGO || 'false' }}
          FORCE_TEAM_LOGOS: ${{ secrets.FORCE_TEAM_LOGOS }}
          TOURNAMENT_ID: ${{ secrets.TOURNAMENT_ID }}
          LOOKBACK_DAYS: ${{ secrets.LOOKBACK_DAYS }}
          POST_MATCH_SYNC_MINUTES: ${{ secrets.POST_MATCH_SYNC_MINUTES }}
          PROVIDER_CACHE_TTL_MS: ${{ secrets.PROVIDER_CACHE_TTL_MS }}
        run: node run.js
