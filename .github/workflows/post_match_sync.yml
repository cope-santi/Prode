name: Post Match Sync

on:
  schedule:
    # Keep the cron itself simple so GitHub reliably schedules it.
    # The first job step decides whether this is a tournament sync window.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: post-match-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Check sync window
        id: sync-window
        shell: bash
        run: |
          node <<'NODE'
          const now = new Date();
          const month = now.getUTCMonth() + 1;
          const day = now.getUTCDate();
          const hour = now.getUTCHours();
          const isUsefulHour = (hour >= 0 && hour <= 6) || (hour >= 16 && hour <= 23);
          const isGroupStage = month === 6 && day >= 11 && day <= 28;
          const isKnockoutStage = (month === 6 && day >= 29 && day <= 30) || (month === 7 && day >= 1 && day <= 19);
          const shouldRun = process.env.GITHUB_EVENT_NAME === "workflow_dispatch" || (isUsefulHour && (isGroupStage || isKnockoutStage));
          require("node:fs").appendFileSync(process.env.GITHUB_OUTPUT, `should_run=${shouldRun}\n`);
          console.log(`UTC ${now.toISOString()} should_run=${shouldRun}`);
          NODE

      - name: Checkout
        if: steps.sync-window.outputs.should_run == 'true'
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        if: steps.sync-window.outputs.should_run == 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install deps
        if: steps.sync-window.outputs.should_run == 'true'
        working-directory: scripts/sync
        run: npm install

      - name: Run sync
        if: steps.sync-window.outputs.should_run == 'true'
        working-directory: scripts/sync
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          THESPORTSDB_API_KEY: ${{ secrets.THESPORTSDB_API_KEY }}
          THESPORTSDB_LEAGUE_ID: ${{ secrets.THESPORTSDB_LEAGUE_ID }}
          THESPORTSDB_SEASON: ${{ secrets.THESPORTSDB_SEASON }}
          THESPORTSDB_ROUNDS: ${{ secrets.THESPORTSDB_ROUNDS }}
          SYNC_TEAM_LOGOS: ${{ secrets.SYNC_TEAM_LOGOS || secrets.SYNC_TEAM_LOGO || 'false' }}
          FORCE_TEAM_LOGOS: ${{ secrets.FORCE_TEAM_LOGOS }}
          TOURNAMENT_ID: ${{ secrets.TOURNAMENT_ID }}
          LOOKBACK_DAYS: ${{ secrets.LOOKBACK_DAYS }}
          POST_MATCH_SYNC_MINUTES: ${{ secrets.POST_MATCH_SYNC_MINUTES }}
          PROVIDER_CACHE_TTL_MS: ${{ secrets.PROVIDER_CACHE_TTL_MS }}
        run: node run.js
